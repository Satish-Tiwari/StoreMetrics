<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>
<body style="font-family: Arial, sans-serif;">
    <div style="background-color: #f4f4f4; padding: 20px; border-radius: 10px;">
        <div style="background-color: #4CAF50; color: white; padding: 10px; border-radius: 5px; text-align: center;">
            <h1>Welcome to StoreMetrics!</h1>
        </div>
        <p style="font-size: 16px;">Hi <strong th:text="${firstName}">User</strong>,</p>
        <p>Your account has been successfully created. You can now log in and explore our dashboard.</p>
        <p style="margin-top: 30px; color: #777; font-size: 12px;">If you did not create this account, please ignore this email.</p>
    </div>
</body>
</html>
