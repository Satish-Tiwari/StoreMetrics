<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body style="font-family: Arial, sans-serif;">
    <div style="background-color: #f4f4f4; padding: 20px; border-radius: 10px;">
        <div style="background-color: #ff5722; color: white; padding: 10px; border-radius: 5px; text-align: center;">
            <h1>Login Notification</h1>
        </div>
        <p style="font-size: 16px;">Hi <strong th:text="${firstName}">User</strong>,</p>
        <p>You have been successfully logged in to StoreMetrics. If this wasn't you, please secure your account immediately.</p>
        <p style="margin-top: 30px; color: #777; font-size: 12px;">Thank you for using our service.</p>
    </div>
</body>
</html>
