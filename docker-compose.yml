version: '3.3'

services:
  # PostgreSQL Database with pgvector
  pg-db:
    image: ankane/pgvector:v0.5.1
    container_name: ecom-postgres-dev
    restart: always
    environment:
      POSTGRES_DB: ecom_analytics
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: production_secure_db_password_here
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - ecom-network-dev

  # Redis Broker for BullMQ queues
  redis-broker:
    image: redis:7.0-alpine
    container_name: ecom-redis-dev
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data
    networks:
      - ecom-network-dev

  # Kafka Event Broker (KRaft mode)
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: ecom-kafka-dev
    restart: always
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    ports:
      - "9092:9092"
    volumes:
      - kafkadata_dev:/bitnami/kafka
    networks:
      - ecom-network-dev

volumes:
  pgdata_dev:
  redisdata_dev:
  kafkadata_dev:

networks:
  ecom-network-dev:
    driver: bridge
